<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Logic Studio | High-End Studio</title>
    <style>
        /* --- MINIMALIST DARK THEME --- */
        :root {
            --bg: #000000;
            --panel: #0a0a0a;
            --accent: #ffffff;
            --border: #1a1a1a;
            --secondary: #666666;
            --success: #ffffff;
            --font: 'Inter', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--accent);
            font-family: var(--font);
            overflow-x: hidden;
        }

        /* --- AUTH WALL --- */
        #auth-wall {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.8s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 50px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 2px;
            text-align: center;
        }

        .main-logo { height: 60px; margin-bottom: 30px; }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--border);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: var(--accent);
            color: black;
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: #ccc; letter-spacing: 4px; }

        /* --- MAIN INTERFACE --- */
        #main-app { opacity: 0; padding-top: 120px; transition: 1s ease; }

        .navbar {
            position: fixed;
            top: 0; width: 100%;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.9);
            border-bottom: 1px solid var(--border);
            z-index: 900;
        }

        .nav-brand { display: flex; align-items: center; font-weight: 900; letter-spacing: 3px; }
        .nav-brand img { height: 30px; margin-right: 15px; }

        section { max-width: 1000px; margin: 0 auto 100px; padding: 0 20px; }
        h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 5px; color: var(--secondary); margin-bottom: 30px; }

        /* --- CARDS & TABLES --- */
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 30px;
            margin-bottom: 20px;
            transition: 0.4s;
        }

        .app-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
        }

        .status-tag { font-size: 10px; border: 1px solid var(--secondary); padding: 2px 8px; border-radius: 10px; }

        .hidden { display: none !important; }
        .error { color: #ff4444; font-size: 12px; margin-top: 5px; }

        /* --- GAME TRACKER --- */
        .task-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .task-item.done { text-decoration: line-through; opacity: 0.4; }
    </style>
</head>
<body>

    <div id="auth-wall">
        <div class="auth-card">
            <img src="logo.png" alt="DOUBLE LOGIC" class="main-logo" onerror="this.src='https://via.placeholder.com/150x50/000000/FFFFFF?text=DOUBLE+LOGIC'">
            <div id="auth-form">
                <input type="text" id="auth-user" placeholder="Username (Min 5 characters)">
                <input type="password" id="auth-pass" placeholder="Password">
                <button class="btn" onclick="handleAuth()">Enter Studio</button>
                <p id="auth-error" class="error"></p>
            </div>
        </div>
    </div>

    <div id="main-app">
        <nav class="navbar">
            <div class="nav-brand">
                <img src="logo.png" alt="DL" onerror="this.style.display='none'">
                DOUBLE LOGIC
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="user-tag" style="font-size: 12px; color: var(--secondary);"></span>
                <button onclick="logout()" style="background:none; border:none; color:white; cursor:pointer; font-size: 11px; letter-spacing: 1px;">LOGOUT</button>
            </div>
        </nav>

        <section id="dev-hub" class="hidden">
            <h2>Developer Hub</h2>
            <div class="card">
                <h3>Game Progress Tracker</h3>
                <div style="display:flex; gap:10px; margin: 20px 0;">
                    <input type="text" id="new-task" placeholder="Add new game milestone..." style="margin:0">
                    <button class="btn" style="margin:0; width:120px; font-size:10px;" onclick="addTask()">Add</button>
                </div>
                <div id="task-container"></div>
            </div>

            <div class="card">
                <h3>Incoming Applications</h3>
                <div id="application-container" style="margin-top:20px;">
                    <p style="color:var(--secondary)">No applications pending.</p>
                </div>
            </div>
        </section>

        <section id="hiring-section">
            <h2>Recruitment</h2>
            <div class="card">
                <p style="margin-bottom:20px; color:var(--secondary);">Submit your details to join the Double Logic development team.</p>
                <input type="text" id="hire-role" placeholder="Desired Role (e.g., Scripter, UI Designer)">
                <input type="text" id="hire-exp" placeholder="Experience (e.g., 2 Years)">
                <textarea id="hire-reason" placeholder="Why should we hire you?"></textarea>
                <button class="btn" onclick="submitApplication()">Submit Application</button>
            </div>
        </section>
    </div>

    <script>
        /* --- CORE LOGIC --- */
        let db = {
            users: JSON.parse(localStorage.getItem('dl_users')) || [],
            currentUser: JSON.parse(localStorage.getItem('dl_current')) || null,
            tasks: JSON.parse(localStorage.getItem('dl_tasks')) || [],
            apps: JSON.parse(localStorage.getItem('dl_apps')) || []
        };

        window.onload = () => {
            if (db.currentUser) {
                launchApp();
            }
        };

        function handleAuth() {
            const user = document.getElementById('auth-user').value.trim();
            const pass = document.getElementById('auth-pass').value;
            const err = document.getElementById('auth-error');

            if (user.length < 5) {
                err.innerText = "Username must be at least 5 characters.";
                return;
            }

            // Check if user exists
            let existingUser = db.users.find(u => u.name.toLowerCase() === user.toLowerCase());

            if (existingUser) {
                if (existingUser.pass === pass) {
                    db.currentUser = existingUser;
                } else {
                    err.innerText = "Incorrect password for this user.";
                    return;
                }
            } else {
                // Register new user
                let newUser = { name: user, pass: pass, role: (user.toLowerCase() === 'avarin' ? 'dev' : 'user') };
                db.users.push(newUser);
                db.currentUser = newUser;
                localStorage.setItem('dl_users', JSON.stringify(db.users));
            }

            localStorage.setItem('dl_current', JSON.stringify(db.currentUser));
            launchApp();
        }

        function launchApp() {
            document.getElementById('auth-wall').style.transform = "translateY(-100%)";
            document.getElementById('main-app').style.opacity = "1";
            document.getElementById('user-tag').innerText = `@${db.currentUser.name.toUpperCase()}`;

            if (db.currentUser.name.toLowerCase() === 'avarin') {
                document.getElementById('dev-hub').classList.remove('hidden');
                renderDevTools();
            }
        }

        /* --- DEVELOPER TOOLS --- */
        function renderDevTools() {
            // Render Tasks
            const taskBox = document.getElementById('task-container');
            taskBox.innerHTML = db.tasks.map((t, i) => `
                <div class="task-item ${t.done ? 'done' : ''}">
                    <input type="checkbox" ${t.done ? 'checked' : ''} onclick="toggleTask(${i})">
                    <span>${t.text}</span>
                    <button onclick="deleteTask(${i})" style="margin-left:auto; background:none; border:none; color:red; cursor:pointer;">&times;</button>
                </div>
            `).join('');

            // Render Applications
            const appBox = document.getElementById('application-container');
            if (db.apps.length === 0) {
                appBox.innerHTML = '<p style="color:var(--secondary)">No applications pending.</p>';
            } else {
                appBox.innerHTML = db.apps.map((a, i) => `
                    <div class="app-item">
                        <div>
                            <div style="font-weight:bold">${a.user}</div>
                            <div style="font-size:12px; color:var(--secondary)">${a.role} | Exp: ${a.exp}</div>
                            <div style="font-size:11px; margin-top:5px;">"${a.reason}"</div>
                        </div>
                        <button onclick="removeApp(${i})" class="btn" style="width:80px; font-size:8px; padding:5px;">Dismiss</button>
                    </div>
                `).join('');
            }
        }

        function addTask() {
            const input = document.getElementById('new-task');
            if (!input.value) return;
            db.tasks.push({ text: input.value, done: false });
            saveAndRefresh();
            input.value = "";
        }

        function toggleTask(i) {
            db.tasks[i].done = !db.tasks[i].done;
            saveAndRefresh();
        }

        function deleteTask(i) {
            db.tasks.splice(i, 1);
            saveAndRefresh();
        }

        /* --- APPLICATION LOGIC --- */
        function submitApplication() {
            const role = document.getElementById('hire-role').value;
            const exp = document.getElementById('hire-exp').value;
            const reason = document.getElementById('hire-reason').value;

            if (!role || !reason) {
                alert("Please fill in all fields.");
                return;
            }

            const newApp = {
                user: db.currentUser.name,
                role: role,
                exp: exp,
                reason: reason
            };

            db.apps.push(newApp);
            localStorage.setItem('dl_apps', JSON.stringify(db.apps));
            alert("Your application has been submitted to Avarin!");
            
            // Clear fields
            document.getElementById('hire-role').value = "";
            document.getElementById('hire-exp').value = "";
            document.getElementById('hire-reason').value = "";
            
            if (db.currentUser.name.toLowerCase() === 'avarin') renderDevTools();
        }

        function removeApp(i) {
            db.apps.splice(i, 1);
            localStorage.setItem('dl_apps', JSON.stringify(db.apps));
            renderDevTools();
        }

        function saveAndRefresh() {
            localStorage.setItem('dl_tasks', JSON.stringify(db.tasks));
            renderDevTools();
        }

        function logout() {
            localStorage.removeItem('dl_current');
            location.reload();
        }
    </script>
</body>
</html>
